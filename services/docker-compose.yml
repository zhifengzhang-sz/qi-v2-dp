services:
  questdb:
    image: questdb/questdb:7.3.6
    hostname: questdb
    container_name: questdb
    ports:
      - "9000:9000"
      - "9009:9009"
      - "8812:8812"
    networks:
      - qi_db_network
    volumes:
      - questdb_volume:/var/lib/questdb
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: "1G"
          cpus: "1.0"

  grafana:
    image: grafana/grafana-oss:9.5.2
    hostname: grafana
    container_name: grafana
    networks:
      - qi_db_network
    ports:
      - "4000:3000"
    volumes:
      - grafana_volume:/var/lib/grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - timescaledb
      - questdb
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "0.5"

  timescaledb:
    image: timescale/timescaledb:2.13.0-pg16
    hostname: timescaledb
    container_name: timescaledb
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - timescale_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - qi_db_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: "2G"
          cpus: "1.0"

  pgadmin:
    image: dpage/pgadmin4:8.11.0
    hostname: pgadmin
    container_name: pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8000:80"
    volumes:
      - pgadmin_volume:/var/lib/pgadmin
    networks:
      - qi_db_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - timescaledb
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "0.5"

  redis:
    image: redis:7.0.5
    container_name: redis
    networks:
      - redis_network
    ports:
      - "6379:6379"
    volumes:
      - redis_volume:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "0.5"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: redpanda
    networks:
      - redpanda_network
    ports:
      - "9092:9092"
      - "9644:9644"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    env_file:
      - .env
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - ${REDPANDA_ADVERTISED_KAFKA_API}:33145
      - --kafka-addr
      - 0.0.0.0:9092
      - --advertise-kafka-addr
      - ${REDPANDA_ADVERTISED_KAFKA_API}:9092
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --smp
      - "1"
      - --memory
      - 2G
    restart: unless-stopped

  console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: redpanda-console
    networks:
      - redpanda_network
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

networks:
  qi_db_network:
    driver: bridge
    name: qi_db
  redis_network:
    driver: bridge
    name: redis_network
  redpanda_network:
    driver: bridge
    name: redpanda_network

volumes:
  questdb_volume:
    name: questdb_data
  timescale_volume:
    name: timescaledb_data
  pgadmin_volume:
    name: pgadmin_data
  grafana_volume:
    name: grafana_data
  redis_volume:
    name: redis_data
  redpanda_data:
    name: redpanda_data
