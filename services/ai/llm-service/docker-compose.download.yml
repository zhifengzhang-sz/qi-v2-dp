services:
  model-prep:
    image: python:3.10-slim
    volumes:
      - ./.cache:/data
      - ./scripts:/scripts
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - HF_HOME=/data
      - HUGGING_FACE_HUB_CACHE=/data
      - PYTHONUNBUFFERED=1
    command: >
      bash -c '
        pip install --no-cache-dir huggingface_hub hf_transfer tqdm &&
        python /scripts/download_model.py
      '
