services:
  tgi:
    image: ghcr.io/huggingface/text-generation-inference:latest
    ports:
      - "8080:80"
    env_file:
      - ${INFRA_CONFIG:-config/infra/cpu.env}
      - ${MODEL_CONFIG:-config/models/model.env}
    environment:
      - HF_HUB_OFFLINE=1
      - HF_HOME=/data
      - HUGGING_FACE_HUB_CACHE=/data
    mem_limit: 32G
    cpus: 8.0
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./.cache:/data:rw