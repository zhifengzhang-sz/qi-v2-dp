services:
  tgi:
    image: ghcr.io/huggingface/text-generation-inference:latest
    ports:
      - "8080:80"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=0
    env_file:
      - ${INFRA_CONFIG:-config/infra/cpu.env}
      - ${MODEL_CONFIG:-config/models/model.env}
    mem_limit: 32G
    cpus: 8.0
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./cache:/data
