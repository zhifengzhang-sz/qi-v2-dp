services:
  base:
    image: local/llm-service-base:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    dns:
      - 8.8.8.8
      - 8.8.4.4

  download:
    image: local/llm-service-base:latest
    volumes:
      - ../scripts:/app/scripts
      - ../.cache:/data/hub
    env_file:
      - ../config/models/model.env
    environment:
      - MODEL_ID=${MODEL_ID:-codellama/CodeLlama-7b-instruct-hf}
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DOWNLOAD_TIMEOUT=600
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    dns:
      - 8.8.8.8
      - 8.8.4.4
    working_dir: /app
    entrypoint: ["python3", "-u", "scripts/download_model.py"]
