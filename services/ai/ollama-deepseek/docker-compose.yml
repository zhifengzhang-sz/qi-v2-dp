services:

  mongodb:
    image: mongo:5.0
    container_name: qi-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: chat_db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    command: mongod --bind_ip_all --auth --wiredTigerCacheSizeGB 2
    ulimits:
      nproc: 64000
      nofile:
        soft: 64000
        hard: 64000
    networks:
      - chat-ui
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_ROOT_USER:-admin}", "--password", "${MONGO_ROOT_PASSWORD:-secret}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ollama-service:
    image: ollama/ollama:latest
    container_name: qi-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_CPU_ONLY=1
      - OLLAMA_COMPUTE=cpu
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX}
      - OLLAMA_NUM_BATCH=${OLLAMA_NUM_BATCH}
      - OLLAMA_MODEL=${OLLAMA_MODEL_NAME}
      - OLLAMA_GPU=${OLLAMA_GPU}
    deploy:
      resources:
        limits:
          cpus: ${CONTAINER_CPU_LIMIT}
          memory: ${CONTAINER_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "/bin/ollama", "serve", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chat-ui

  chat-ui:
    image: ghcr.io/huggingface/chat-ui:latest
    container_name: qi-chat-ui
    restart: unless-stopped
    volumes:
      - ./db:/data
      - ./.env-local:/app/.env.local:ro
    environment:
      - MONGODB_URL=mongodb://admin:secret@mongodb:27017/chat_db?authSource=admin
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      ollama-service:
        condition: service_healthy
    networks:
      - chat-ui

volumes:
  mongodb_data:
    name: qi-mongodb-data
  ollama_data:
    name: qi-ollama-data

networks:
  chat-ui:
    name: qi-network
    driver: bridge